<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>포토로그</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 상단 네비게이션 -->
    <div class="top-bar">
        <div class="logo">포토로그</div>
        <div class="nav-menu">
            <span class="nav-item">챗봇</span>
            <div class="nav-link-wrapper">
              <div class="nav-link active hover-dropdown">마이페이지
                <div class="dropdown-menu">
                  <a href="{% url 'mypage:mypage' %}" class="dropdown-item">내 정보</a>
                  <a href="{% url 'survey:survey' %}" class="dropdown-item">설문 조사</a>
                  <a href="{% url 'product:like_product' %}" class="dropdown-item">좋아요</a>
                  <a href="{% url 'product:nutrition_analysis' %}" class="dropdown-item">영양 분석</a>
                </div>
              </div>
            </div>
            <span class="nav-item">영양제</span>
        </div>
        <div class="user-info">
            {% if user.is_authenticated %}
                <span>{{ user.name }}님</span>
                <a href="{% url 'account:logout' %}" class="dropdown-item">로그아웃</a>
            {% else %}
                <a href="{% url 'account:login' %}" class="dropdown-item">로그인</a>
            {% endif %}
        </div>
    </div>

    <!-- 메인 컨텐츠 -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
