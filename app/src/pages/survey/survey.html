<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>건강 설문조사</title>
    <meta name="viewport" content="width=1920, initial-scale=1.0">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>
<body>
    <!-- 상단 네비게이션 -->
    <div class="top-bar">
        <div class="logo">포토로그</div>
        <div class="nav-menu">
            <span class="nav-item selected">마이페이지</span>
            <span class="nav-item">챗봇</span>
            <span class="nav-item">영양제</span>
        </div>
        <div class="user-info">
            <span>홍길동님~!</span>
            <span class="dropdown-arrow"></span>
        </div>
    </div>

    <!-- 설문조사 카드 -->
    <div class="survey-card">
        <h2 class="survey-title">안녕하세요, 홍승표님!</h2>
        <p class="survey-desc">
            설문조사를 통해 파악된 홍승표님의 건강 상태와 생활 습관을 바탕으로,<br>
            꼭 필요한 영양제를 추천해 드립니다.
        </p>
        <div class="question-group">
            <div class="question-title">Q. 주로 앉아서 하는 일을 하시나요?</div>
            <div class="option-row">
                <div class="option-box" data-value="yes">예</div>
                <div class="option-box" data-value="no">아니오</div>
            </div>
        </div>
        <div class="question-group">
            <div class="question-title">Q. 당신의 성별은?</div>
            <div class="option-row">
                <div class="option-box" data-value="male">남성</div>
                <div class="option-box" data-value="female">여성</div>
            </div>
        </div>
        <div class="question-group">
            <div class="question-title">Q. 당신이 태어난 년도를 입력해주세요.</div>
            <input type="text" class="birth-input" maxlength="4" placeholder="YYYY">
        </div>
        <button class="start-btn">시작하기</button>
    </div>
</body>
</html>
